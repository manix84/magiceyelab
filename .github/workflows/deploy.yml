name: Deploy to GitHub Pages

run-name: >-
  Deploy MagicEyeLab to GitHub Pages
  ${{ github.event_name == 'workflow_dispatch' && '(manual)' || '' }}

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      deploy_title:
        description: Optional deployment title
        required: false
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: >-
      ${{ github.event.inputs.deploy_title || 'Deploy to GitHub Pages' }}

    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 25
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: TypeFix
        run: npm run typefix

      - name: Build MagicEyeLab
        run: npm run build:dry-run

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
